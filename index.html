<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aether — Cognitive Architecture Framework. Transform frontier AI models into adaptive, self-improving cognitive systems." />
    <meta name="color-scheme" content="dark" />
    <title>Aether</title>

    <!-- Preload premium fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent flash of unstyled content -->
    <style>
      html { background-color: #0A0A0C; }
      body { margin: 0; opacity: 0; transition: opacity 0.3s ease; }
      body.loaded { opacity: 1; }
    </style>

    <script>
      // Initialize dark mode immediately to prevent flash
      document.documentElement.classList.add('dark');
      // Mark body as loaded after DOM is ready
      window.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('loaded');
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
